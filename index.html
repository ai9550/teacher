<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豪老師的教學遊戲天地</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cat-chinese: #e15b4f;
            --cat-math: #3b8fd9;
            --cat-interactive: #43a06f;
            --cat-puzzle: #d9922e;
            --cat-other: #8b7bb0;
            --paper: #fffdf6;
            --wood-dark: #5c3d24;
            --wood-light: #8a5a34;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            background: #ded4c3;
            background-image:
                radial-gradient(circle at 20% 10%, rgba(255,255,255,0.5) 0, transparent 40%),
                radial-gradient(circle at 80% 90%, rgba(0,0,0,0.05) 0, transparent 40%);
            min-height: 100vh;
            color: #3a2e22;
        }

        .app {
            display: flex;
            min-height: 100vh;
        }

        /* ---------- Sidebar ---------- */
        .sidebar {
            width: 240px;
            flex-shrink: 0;
            background:
                repeating-linear-gradient(
                    90deg,
                    rgba(0,0,0,0.06) 0px,
                    rgba(0,0,0,0.06) 2px,
                    transparent 2px,
                    transparent 26px
                ),
                linear-gradient(180deg, var(--wood-light) 0%, var(--wood-dark) 100%);
            box-shadow: 4px 0 16px rgba(0,0,0,0.25);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar-title {
            font-family: 'ZCOOL KuaiLe', 'Noto Sans TC', sans-serif;
            color: #ffe9c7;
            font-size: 1.4em;
            text-align: center;
            text-shadow: 0 2px 3px rgba(0,0,0,0.4);
            letter-spacing: 2px;
            padding-bottom: 10px;
            border-bottom: 2px dashed rgba(255,255,255,0.3);
        }

        .category-nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .cat-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            border: none;
            cursor: pointer;
            padding: 12px 14px;
            border-radius: 10px 4px 10px 4px;
            background: var(--paper);
            color: #3a2e22;
            font-family: 'Noto Sans TC', sans-serif;
            font-weight: 700;
            font-size: 1em;
            box-shadow: 0 3px 0 rgba(0,0,0,0.25), 0 4px 6px rgba(0,0,0,0.2);
            transform: rotate(-1deg);
            transition: all 0.15s ease;
            border-left: 6px solid var(--btn-color, #999);
        }

        .cat-btn:nth-child(even) {
            transform: rotate(1deg);
        }

        .cat-btn:hover {
            transform: translateY(-2px) rotate(0deg);
            box-shadow: 0 5px 0 rgba(0,0,0,0.25), 0 8px 12px rgba(0,0,0,0.25);
        }

        .cat-btn.active {
            background: var(--btn-color, #999);
            color: white;
            transform: translateY(-2px) rotate(0deg) scale(1.03);
        }

        .cat-icon {
            font-size: 1.3em;
        }

        .cat-name {
            flex: 1;
            text-align: left;
        }

        .cat-count {
            font-size: 0.8em;
            background: rgba(0,0,0,0.12);
            border-radius: 20px;
            padding: 2px 8px;
            min-width: 22px;
            text-align: center;
        }

        .cat-btn.active .cat-count {
            background: rgba(255,255,255,0.3);
        }

        /* ---------- Main ---------- */
        .main {
            flex: 1;
            padding: 30px 40px 60px;
            min-width: 0;
        }

        .blackboard {
            background: linear-gradient(160deg, #2f4a3d, #22362c);
            border: 10px solid #7a5230;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3), inset 0 0 40px rgba(0,0,0,0.35);
            padding: 26px 32px;
            margin-bottom: 30px;
            position: relative;
        }

        .blackboard::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 6px 6px;
            border-radius: 4px;
            pointer-events: none;
        }

        .blackboard h1 {
            font-family: 'ZCOOL KuaiLe', 'Noto Sans TC', sans-serif;
            color: #fdf6e3;
            font-size: 2.2em;
            text-shadow: 0 0 6px rgba(255,255,255,0.25);
            letter-spacing: 1px;
        }

        .blackboard p {
            margin-top: 8px;
            color: #d9e8de;
            font-size: 1.05em;
            opacity: 0.9;
        }

        .loading {
            text-align: center;
            color: #6b5a45;
            padding: 40px;
            font-size: 1.1em;
        }

        .spinner {
            border: 4px solid rgba(0,0,0,0.1);
            border-top: 4px solid var(--wood-light);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .count-bar {
            color: #6b5a45;
            margin-bottom: 16px;
            font-size: 0.95em;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 22px;
        }

        .card {
            position: relative;
            background: var(--paper);
            background-image: repeating-linear-gradient(
                to bottom,
                transparent 0,
                transparent 27px,
                rgba(59,143,217,0.08) 28px
            );
            border-radius: 6px;
            padding: 20px 16px 16px;
            text-decoration: none;
            color: #3a2e22;
            box-shadow: 0 4px 10px rgba(0,0,0,0.18);
            transform: rotate(var(--tilt, 0deg));
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 120px;
            border-top: 5px solid var(--btn-color, #999);
            animation: dropIn 0.35s ease-out both;
        }

        @keyframes dropIn {
            from { opacity: 0; transform: translateY(-14px) rotate(var(--tilt, 0deg)); }
            to   { opacity: 1; transform: translateY(0) rotate(var(--tilt, 0deg)); }
        }

        .card::before {
            content: "📌";
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2em;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.4));
        }

        .card:hover {
            transform: rotate(0deg) translateY(-6px) scale(1.03);
            box-shadow: 0 12px 22px rgba(0,0,0,0.28);
            z-index: 2;
        }

        .card-tag {
            align-self: flex-start;
            font-size: 0.72em;
            font-weight: 700;
            color: white;
            background: var(--btn-color, #999);
            padding: 2px 10px;
            border-radius: 20px;
        }

        .card-name {
            font-weight: 700;
            font-size: 1.02em;
            line-height: 1.4;
            flex: 1;
        }

        .card-go {
            align-self: flex-end;
            font-size: 0.85em;
            color: var(--btn-color, #999);
            font-weight: 700;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #c33;
        }

        .empty {
            padding: 30px;
            text-align: center;
            color: #8a7a63;
            background: rgba(255,255,255,0.5);
            border-radius: 10px;
        }

        /* ---------- Mobile ---------- */
        @media (max-width: 720px) {
            .app {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                flex-direction: row;
                align-items: center;
                overflow-x: auto;
                padding: 14px;
            }
            .sidebar-title {
                display: none;
            }
            .category-nav {
                flex-direction: row;
                gap: 8px;
            }
            .cat-btn {
                flex-shrink: 0;
                width: auto;
                transform: none !important;
            }
            .main {
                padding: 20px;
            }
            .blackboard h1 {
                font-size: 1.6em;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-title">📚 分類選單</div>
            <nav id="categoryNav" class="category-nav"></nav>
        </aside>

        <main class="main">
            <div class="blackboard">
                <h1>📖 豪老師的教學遊戲天地</h1>
                <p>點選左側分類，挑一個遊戲開始上課吧！</p>
            </div>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>正在載入檔案列表...</p>
            </div>

            <div id="content" style="display: none;">
                <div id="count" class="count-bar"></div>
                <div id="cardGrid" class="card-grid"></div>
            </div>

            <div id="error" style="display: none;" class="error"></div>
        </main>
    </div>

    <script>
        // 分類設定：依序比對關鍵字，第一個符合的分類獲勝
        const CATEGORIES = [
            { id: 'chinese',     name: '國語',     icon: '📖', color: 'var(--cat-chinese)',     keywords: ['國語', '生字', '語詞'] },
            { id: 'math',        name: '數學',     icon: '🔢', color: 'var(--cat-math)',        keywords: ['數學', '加法', '減法', '乘法', '除法'] },
            { id: 'interactive', name: '課堂互動', icon: '🎮', color: 'var(--cat-interactive)', keywords: ['多人', '文字雲'] },
            { id: 'puzzle',      name: '益智遊戲', icon: '🧩', color: 'var(--cat-puzzle)',      keywords: ['猜謎', '猜猜看'] },
            { id: 'other',       name: '其他',     icon: '📁', color: 'var(--cat-other)',       keywords: [] }
        ];

        let allFiles = [];
        let activeCategory = 'all';

        function getRepoInfo() {
            const hostname = window.location.hostname;
            const pathname = window.location.pathname;

            if (hostname.includes('github.io')) {
                const parts = pathname.split('/').filter(p => p);
                if (parts.length > 0) {
                    const username = hostname.split('.')[0];
                    const repo = parts[0];
                    return { username, repo, path: parts.slice(1).join('/') || '' };
                }
            }

            return { username: 'ai9550', repo: 'teacher', path: '' };
        }

        function getCurrentPath() {
            const pathname = window.location.pathname;
            const parts = pathname.split('/').filter(p => p);
            if (parts.length > 1) {
                return parts.slice(1).join('/');
            }
            return '';
        }

        function categorize(filename) {
            for (const cat of CATEGORIES) {
                if (cat.id === 'other') continue;
                if (cat.keywords.some(kw => filename.includes(kw))) return cat.id;
            }
            return 'other';
        }

        async function fetchFileList() {
            const repoInfo = getRepoInfo();
            const currentPath = getCurrentPath();
            const apiPath = currentPath ? `${currentPath}/` : '';
            const apiUrl = `https://api.github.com/repos/${repoInfo.username}/${repoInfo.repo}/contents/${apiPath}`;

            try {
                const response = await fetch(apiUrl);

                if (!response.ok) {
                    throw new Error(`HTTP 錯誤: ${response.status}`);
                }

                const files = await response.json();

                allFiles = files
                    .filter(file =>
                        file.type === 'file' &&
                        file.name.endsWith('.html') &&
                        file.name !== 'index.html'
                    )
                    .map(file => ({ name: file.name, categoryId: categorize(file.name) }))
                    .sort((a, b) => a.name.localeCompare(b.name, 'zh-Hant'));

                renderSidebar();
                renderCards();

            } catch (error) {
                console.error('錯誤:', error);
                showError(`無法載入檔案列表: ${error.message}<br><br>請確認：<br>1. 倉庫是公開的<br>2. GitHub API 可以正常訪問<br>3. 路徑設定正確`);
            }
        }

        function renderSidebar() {
            const nav = document.getElementById('categoryNav');
            nav.innerHTML = '';

            const allCount = allFiles.length;
            nav.appendChild(makeCatButton('all', '全部', '🗂️', '#5c3d24', allCount));

            CATEGORIES.forEach(cat => {
                const count = allFiles.filter(f => f.categoryId === cat.id).length;
                if (count === 0) return;
                nav.appendChild(makeCatButton(cat.id, cat.name, cat.icon, cat.color, count));
            });
        }

        function makeCatButton(id, name, icon, color, count) {
            const btn = document.createElement('button');
            btn.className = 'cat-btn' + (activeCategory === id ? ' active' : '');
            btn.style.setProperty('--btn-color', color);
            btn.innerHTML = `<span class="cat-icon">${icon}</span><span class="cat-name">${name}</span><span class="cat-count">${count}</span>`;
            btn.onclick = () => {
                activeCategory = id;
                renderSidebar();
                renderCards();
            };
            return btn;
        }

        function renderCards() {
            const loadingDiv = document.getElementById('loading');
            const contentDiv = document.getElementById('content');
            const grid = document.getElementById('cardGrid');
            const countDiv = document.getElementById('count');

            loadingDiv.style.display = 'none';
            contentDiv.style.display = 'block';

            const files = activeCategory === 'all'
                ? allFiles
                : allFiles.filter(f => f.categoryId === activeCategory);

            grid.innerHTML = '';

            if (files.length === 0) {
                grid.innerHTML = '<div class="empty">這個分類目前還沒有遊戲喔</div>';
                countDiv.textContent = '';
                return;
            }

            const catMap = Object.fromEntries(CATEGORIES.map(c => [c.id, c]));
            const tilts = [-2, -1, 0, 1, 2];

            files.forEach((file, index) => {
                const cat = catMap[file.categoryId];
                const a = document.createElement('a');
                a.className = 'card';
                a.href = file.name;
                a.style.setProperty('--btn-color', cat.color);
                a.style.setProperty('--tilt', `${tilts[index % tilts.length]}deg`);
                a.style.animationDelay = `${index * 0.03}s`;

                const displayName = file.name.replace(/\.html$/i, '');

                a.innerHTML = `
                    <span class="card-tag">${cat.icon} ${cat.name}</span>
                    <div class="card-name">${displayName}</div>
                    <span class="card-go">開始遊戲 ▶</span>
                `;
                grid.appendChild(a);
            });

            countDiv.textContent = `共 ${files.length} 個遊戲`;
        }

        function showError(message) {
            const loadingDiv = document.getElementById('loading');
            const errorDiv = document.getElementById('error');

            loadingDiv.style.display = 'none';
            errorDiv.style.display = 'block';
            errorDiv.innerHTML = `<strong>錯誤：</strong><br>${message}`;
        }

        window.addEventListener('DOMContentLoaded', () => {
            fetchFileList();
        });
    </script>
</body>
</html>
